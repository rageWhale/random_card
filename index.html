<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="./assets/iconfont/iconfont.css">
  <link rel="stylesheet" href="./css/base.css">
  <link rel="stylesheet" href="./css/main.css">
  <link rel="manifest" href="./manifest.json">
  <title>Random Card Cooser</title>
  <script type="module" src="./js/main.js" defer></script>
</head>

<body>
  <div class="randomCard">
    <div class="cardInner">
      <!-- Front -->
      <div class="cardFront active">
        <h2 class="no-select">Random Card</h2>
        <div class="uploads">
          <input type="text" id="cardName" placeholder="Card Name">
          <input type="file" id="upload" accept="image/*" style="display: none;">
          <label for="upload" class="uploadLab"><i class="iconfont icon-shangchuan"></i>upload</label>
          <button id="addCard"></button>
          <button class="setUp"></button>
        </div>
        <div class="cardBox">
          <img src="./assets/images/default.png" alt="" class="no-select">
        </div>
        <div class="action">
          <div class="btn">
            <button class="start no-select">Start</button>
            <button class="stop no-select" disabled>Stop</button>
            <button class="reset no-select"><i class="iconfont icon-shuaxin"></i></button>
          </div>
        </div>
      </div>
      <!-- Back -->
      <div class="cardBack">
        <h2 class="no-select">Card Manager</h2>
        <div class="cardSearch">
          <input type="text" class="search no-select" placeholder="Search by name">
          <button class="searchBtn no-select"><i class="iconfont icon-search"></i></button>
          <button class="backBtn no-select"><i class="iconfont icon-back"></i></button>
          <button class="setUp no-select"></button>
        </div>
        <div class="cardManager">
          <ul>
          </ul>
        </div>
      </div>
    </div>
  </div>
</body>

</html>
